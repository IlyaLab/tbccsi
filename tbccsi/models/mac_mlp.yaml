name: "mac_mlp"
version: "1.0"
description: >
  Frozen Virchow2 CLS token → 2-layer MLP(1280 → 512 → 256 → 2).
  Outputs log1p-transformed macrophage counts (n_m1, n_m2).
  Shared MLP head, no domain adaptation.

backbone:
  model_name: "hf-hub:paige-ai/Virchow2"
  pretrained: true
  freeze: true
  create_kwargs:
    mlp_layer: "SwiGLUPacked"
    act_layer: "SiLU"

model_class: "tbccsi.models.mac_mlp.MacRegressorMLP"
init_kwargs:
  fc1_dim: 512
  head_dim: 256
  dropout: 0.4

# No extra forward args — model(x) returns [B, 2]
forward_extra_kwargs: {}

output_format: "single"

heads:
  - name: "macrophage_counts"
    num_outputs: 2
    activation: "none"
    outputs:
      - name: "n_m1"
        index: 0
        output_col: "log1p_n_m1"
      - name: "n_m2"
        index: 1
        output_col: "log1p_n_m2"

tile_size: 224
normalize: "reinhard"
strip_prefix: ""