name: "mac_resnet"
version: "1.0"
description: >
  Frozen ResNet-50 global-avg-pool features (2048-d) → Linear(2048 → 2).
  Outputs log1p-transformed macrophage counts (n_m1, n_m2).
  Baseline comparison model (no Virchow2, no domain adaptation).

backbone:
  model_name: "resnet50"
  pretrained: true
  freeze: true
  create_kwargs:
    num_classes: 0
    global_pool: "avg"

model_class: "tbccsi.models.mac_resnet.MacRegressorResNet"
init_kwargs: {}

# No extra forward args — model(x) returns [B, 2]
forward_extra_kwargs: {}

output_format: "single"

heads:
  - name: "macrophage_counts"
    num_outputs: 2
    activation: "none"
    outputs:
      - name: "n_m1"
        index: 0
        output_col: "log1p_n_m1"
      - name: "n_m2"
        index: 1
        output_col: "log1p_n_m2"

tile_size: 224
normalize: "reinhard"
strip_prefix: ""