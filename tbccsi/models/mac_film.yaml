name: "mac_film"
version: "1.0"
description: >
  Frozen Virchow2 CLS token → shared MLP with FiLM domain conditioning.
  Outputs log1p-transformed macrophage counts (n_m1, n_m2).
  Requires domain_id at inference (override with --domain-id):
    0 = g6d2v1
    1 = g1d3, g4d2, g4d3 (post-CODEX staining)

backbone:
  model_name: "hf-hub:paige-ai/Virchow2"
  pretrained: true
  freeze: true
  create_kwargs:
    mlp_layer: "SwiGLUPacked"
    act_layer: "SiLU"

model_class: "tbccsi.models.mac_film.MacRegressorFiLM"
init_kwargs:
  num_domains: 2
  fc1_dim: 512
  head_dim: 256
  dropout: 0.4

# model(x, domain_id) — default to domain 0
forward_extra_kwargs:
  domain_id: 0

output_format: "single"

heads:
  - name: "macrophage_counts"
    num_outputs: 2
    activation: "none"
    outputs:
      - name: "n_m1"
        index: 0
        output_col: "log1p_n_m1"
      - name: "n_m2"
        index: 1
        output_col: "log1p_n_m2"

tile_size: 224
normalize: "reinhard"
strip_prefix: ""