name: "mac_linear"
version: "1.0"
description: >
  Frozen Virchow2 CLS token → Linear(1280 → 2).
  Outputs log1p-transformed macrophage counts (n_m1, n_m2).
  No domain adaptation.

backbone:
  model_name: "hf-hub:paige-ai/Virchow2"
  pretrained: true
  freeze: true
  create_kwargs:
    mlp_layer: "SwiGLUPacked"
    act_layer: "SiLU"

model_class: "tbccsi.models.mac_linear.MacRegressorLinear"
init_kwargs: {}

# No extra forward args — model(x) returns [B, 2]
forward_extra_kwargs: {}

output_format: "single"

heads:
  - name: "macrophage_counts"
    num_outputs: 2
    activation: "none"
    outputs:
      - name: "n_m1"
        index: 0
        output_col: "log1p_n_m1"
      - name: "n_m2"
        index: 1
        output_col: "log1p_n_m2"

tile_size: 224
normalize: "reinhard"
strip_prefix: ""